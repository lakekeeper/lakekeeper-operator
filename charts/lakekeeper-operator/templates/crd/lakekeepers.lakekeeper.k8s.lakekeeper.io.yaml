    controller-gen.kubebuilder.io/version: v0.18.0
  name: lakekeepers.lakekeeper.k8s.lakekeeper.io
spec:
  group: lakekeeper.k8s.lakekeeper.io
  names:
    kind: Lakekeeper
    listKind: LakekeeperList
    plural: lakekeepers
    shortNames:
    - lk
    singular: lakekeeper
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Lakekeeper container image
