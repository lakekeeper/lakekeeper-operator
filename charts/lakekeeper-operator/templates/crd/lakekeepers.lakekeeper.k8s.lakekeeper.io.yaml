      name: Image
      type: string
    - description: Desired replicas
      jsonPath: .spec.replicas
      name: Replicas
      type: integer
    - description: Ready replicas
      jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - description: Bootstrap timestamp
      jsonPath: .status.bootstrappedAt
      name: Bootstrapped
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Lakekeeper is the Schema for the lakekeepers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LakekeeperSpec defines the desired state of Lakekeeper.
            properties:
              authentication:
                description: |-
                  Authentication configures identity verification methods.
                  At least one authentication method is required unless using allowall authorization.
                properties:
                  kubernetes:
                    description: Kubernetes configures Kubernetes ServiceAccount token
                      authentication.
                    properties:
                      acceptLegacyTokens:
                        default: false
                        description: |-
                          AcceptLegacyTokens allows authentication with legacy (non-bound) tokens.
                          Should be false in production for security.
                        type: boolean
                      audiences:
                        description: Audiences is a list of acceptable token audiences.
                        items:
                          type: string
                        type: array
                      enabled:
                        default: false
                        description: Enabled enables Kubernetes ServiceAccount token
                          authentication.
                        type: boolean
                    required:
                    - enabled
                    type: object
                  openID:
                    description: OpenID configures OpenID Connect authentication.
                    properties:
                      audience:
                        description: Audience is the expected audience claim in JWT
                          tokens.
                        minLength: 1
                        type: string
                      providerURI:
                        description: |-
                          ProviderURI is the OpenID Connect provider's issuer URL.
                          Must use HTTPS for security (HTTP is not supported).
                          Example: https://login.microsoftonline.com/<tenant-id>/v2.0
                        pattern: ^https://[a-zA-Z0-9.-]+(:[0-9]+)?(/.*)?$
                        type: string
                      rolesClaim:
