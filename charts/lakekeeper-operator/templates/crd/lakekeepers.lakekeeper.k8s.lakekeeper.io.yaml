                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                      host:
                        description: Host is the PostgreSQL server hostname or IP.
                        minLength: 1
                        type: string
                      maxConnections:
                        description: MaxConnections is the maximum number of database
