                type: object
                x-kubernetes-validations:
                - message: openFGA configuration is required when backend is openfga
                  rule: 'self.backend == ''openfga'' ? has(self.openFGA) : true'
                - message: cedar configuration is required when backend is cedar
                  rule: 'self.backend == ''cedar'' ? has(self.cedar) : true'
              bootstrap:
                description: Bootstrap configures automatic server initialization.
                properties:
                  checkInterval:
                    default: 15s
                    description: |-
                      CheckInterval controls how often the operator polls /management/v1/info to detect
                      bootstrap state. This applies regardless of whether the operator performs the
                      bootstrap itself (spec.bootstrap.enabled=true) or merely observes it (e.g. allowall
                      mode or manual bootstrap). Polling stops permanently once bootstrap is confirmed
