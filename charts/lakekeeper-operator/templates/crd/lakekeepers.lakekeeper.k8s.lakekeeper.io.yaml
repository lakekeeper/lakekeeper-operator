                        description: RolesClaim specifies the JWT claim containing
                          user roles.
                        type: string
                      scopes:
                        description: Scopes is a list of OAuth scopes to request.
                        items:
                          type: string
                        type: array
                      subjectClaim:
                        default: sub
                        description: SubjectClaim specifies the JWT claim to use as
                          the user identifier.
                        type: string
                    required:
                    - audience
                    - providerURI
                    type: object
                type: object
              authorization:
                description: Authorization configures access control.
                properties:
                  backend:
                    allOf:
                    - enum:
                      - allowall
                      - openfga
                      - cedar
                    - enum:
                      - allowall
                      - openfga
                      - cedar
                    description: Backend specifies the authorization backend.
                    type: string
                  cedar:
                    description: |-
                      Cedar contains Cedar authorization configuration.
                      Required when backend is cedar (LAKEKEEPER+ only).
                    properties:
                      entitySource:
                        description: EntitySource specifies where Cedar entities are
                          loaded from.
                        minLength: 1
                        type: string
                      policySource:
                        description: PolicySource specifies where Cedar policies are
                          loaded from.
                        minLength: 1
                        type: string
                      userDerivations:
                        additionalProperties:
                          type: string
