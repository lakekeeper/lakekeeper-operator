                          a valid secret key.
                        type: string
                      name:
                        default: ""
                        description: |-
                          Name of the referent.
                          This field is effectively required, but due to backwards compatibility is
                          allowed to be empty. Instances of this type with an empty value here are
                          almost certainly wrong.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      optional:
                        description: Specify whether the Secret or its key must be
                          defined
                        type: boolean
                    required:
                    - key
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
              taskQueues:
                description: TaskQueues configures background task processing.
                properties:
                  expireSnapshotsWorkers:
                    description: ExpireSnapshotsWorkers is the number of workers for
                      snapshot expiration (LAKEKEEPER+ only).
                    format: int32
                    minimum: 1
                    type: integer
                  pollInterval:
                    description: PollInterval is how often to poll for tasks (e.g.,
                      "5s", "500ms").
                    pattern: ^\d+(ms|s)$
                    type: string
                  tabularExpirationWorkers:
                    description: TabularExpirationWorkers is the number of workers
                      for table expiration tasks.
                    format: int32
                    minimum: 1
                    type: integer
                  tabularPurgeWorkers:
                    description: TabularPurgeWorkers is the number of workers for
                      table purge tasks.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
            required:
            - authorization
            - database
            - image
            type: object
          status:
            description: LakekeeperStatus defines the observed state of Lakekeeper.
            properties:
              bootstrappedAt:
                description: BootstrappedAt is the time when the Lakekeeper server
                  was successfully bootstrapped.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the Lakekeeper's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              migrationJob:
                description: |-
                  MigrationJob is the name of the current migration Job.
                  Tracks which migration Job corresponds to the current spec.
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation most recently
                  observed by the controller.
                format: int64
                type: integer
              readyReplicas:
                description: ReadyReplicas is the number of ready pods.
                format: int32
                type: integer
              replicas:
                description: Replicas is the actual number of pods.
                format: int32
                type: integer
              serverID:
                description: ServerID is the Lakekeeper server's unique UUID, set
                  after a successful bootstrap.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
