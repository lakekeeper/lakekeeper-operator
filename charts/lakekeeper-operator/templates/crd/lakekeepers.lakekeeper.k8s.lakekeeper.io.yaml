                        && has(self.userSecretRef))
                  type:
                    description: |-
                      Type specifies the database backend type.
                      Currently only postgres is supported.
                    enum:
                    - postgres
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - message: postgres configuration is required when type is postgres
                  rule: 'self.type == ''postgres'' ? has(self.postgres) : true'
              idempotency:
                description: Idempotency configures request idempotency handling.
                properties:
                  cleanupTimeout:
                    description: CleanupTimeout is how long to wait before cleaning
