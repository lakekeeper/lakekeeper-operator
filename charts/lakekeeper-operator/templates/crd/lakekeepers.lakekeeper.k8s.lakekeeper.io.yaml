                        type: object
                    required:
                    - entitySource
                    - policySource
                    type: object
                  openFGA:
                    description: |-
                      OpenFGA contains OpenFGA authorization configuration.
                      Required when backend is openfga.
                    properties:
                      authorizationModelVersion:
                        description: AuthorizationModelVersion specifies the OpenFGA
                          model version to use.
                        type: string
                      clientID:
                        description: ClientID is the OAuth client ID for OpenFGA authentication.
                        type: string
                      clientSecretRef:
                        description: ClientSecretRef references a secret containing
                          the OAuth client secret.
                        properties:
                          key:
                            description: The key of the secret to select from.  Must
                              be a valid secret key.
                            type: string
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                          optional:
                            description: Specify whether the Secret or its key must
                              be defined
                            type: boolean
                        required:
                        - key
                        type: object
                        x-kubernetes-map-type: atomic
                      endpoint:
                        description: Endpoint is the OpenFGA API endpoint.
                        pattern: ^https?://[a-zA-Z0-9.-]+(:[0-9]+)?$
                        type: string
                      storeName:
                        description: StoreName is the OpenFGA store name.
                        minLength: 1
                        type: string
                    required:
                    - endpoint
                    - storeName
                    type: object
                required:
