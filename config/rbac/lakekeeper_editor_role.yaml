# This rule is not used by the project lakekeeper-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the lakekeeper.k8s.lakekeeper.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: lakekeeper-operator
    app.kubernetes.io/managed-by: kustomize
  name: lakekeeper-editor-role
rules:
- apiGroups:
  - lakekeeper.k8s.lakekeeper.io
  resources:
  - lakekeepers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - lakekeeper.k8s.lakekeeper.io
  resources:
  - lakekeepers/status
  verbs:
  - get
