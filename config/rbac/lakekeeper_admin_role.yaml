# This rule is not used by the project lakekeeper-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over lakekeeper.k8s.lakekeeper.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: lakekeeper-operator
    app.kubernetes.io/managed-by: kustomize
  name: lakekeeper-admin-role
rules:
- apiGroups:
  - lakekeeper.k8s.lakekeeper.io
  resources:
  - lakekeepers
  verbs:
  - '*'
- apiGroups:
  - lakekeeper.k8s.lakekeeper.io
  resources:
  - lakekeepers/status
  verbs:
  - get
