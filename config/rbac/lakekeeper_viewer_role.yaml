# This rule is not used by the project lakekeeper-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to lakekeeper.k8s.lakekeeper.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: lakekeeper-operator
    app.kubernetes.io/managed-by: kustomize
  name: lakekeeper-viewer-role
rules:
- apiGroups:
  - lakekeeper.k8s.lakekeeper.io
  resources:
  - lakekeepers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - lakekeeper.k8s.lakekeeper.io
  resources:
  - lakekeepers/status
  verbs:
  - get
